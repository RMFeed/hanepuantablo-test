<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            font-family: 'Aptos Display', sans-serif;
            margin: 0;
            overflow: hidden;
            width: 1024px;
            height: 1024px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 90%;
            height: 90%;
            border: 5px solid #d4af37;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        h1 { color: #d4af37; text-align: center; font-size: 60px; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-around; align-items: flex-end; height: 400px; margin-top: 50px; }
        .bar-container { display: flex; flex-direction: column; align-items: center; width: 150px; }
        .bar { width: 60px; transition: height 0.5s ease-in-out; }
        .puan { font-size: 35px; font-weight: bold; margin-top: 10px; }
        .mvp-list { margin-top: 50px; font-size: 30px; }
        .mvp-item { margin: 10px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #444; }
        
        .gryf { background-color: #c82828; color: #c82828; }
        .sly { background-color: #28a064; color: #28a064; }
        .rav { background-color: #325ac8; color: #325ac8; }
        .huf { background-color: #f0be28; color: #f0be28; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WYXEN HOGWARTS</h1>
        <div class="stats-row">
            <div class="bar-container">
                <div id="bar_sly" class="bar sly" style="height: 0px;"></div>
                <div id="puan_sly" class="puan sly">0</div>
            </div>
            <div class="bar-container">
                <div id="bar_rav" class="bar rav" style="height: 0px;"></div>
                <div id="puan_rav" class="puan rav">0</div>
            </div>
            <div class="bar-container">
                <div id="bar_gryf" class="bar gryf" style="height: 0px;"></div>
                <div id="puan_gryf" class="puan gryf">0</div>
            </div>
            <div class="bar-container">
                <div id="bar_huf" class="bar huf" style="height: 0px;"></div>
                <div id="puan_huf" class="puan huf">0</div>
            </div>
        </div>
        <div class="mvp-list">
            <div class="mvp-item"><span class="sly">Slytherin MVP:</span> <span id="mvp_sly">-</span></div>
            <div class="mvp-item"><span class="rav">Ravenclaw MVP:</span> <span id="mvp_rav">-</span></div>
            <div class="mvp-item"><span class="gryf">Gryffindor MVP:</span> <span id="mvp_gryf">-</span></div>
            <div class="mvp-item"><span class="huf">Hufflepuff MVP:</span> <span id="mvp_huf">-</span></div>
        </div>
    </div>

    <script>
        // Lua'dan gelen veriyi yakalayan fonksiyon
        function updateData(data) {
            const carpan = 0.5; // Bar boyutu ayarı
            document.getElementById('puan_gryf').innerText = data.gp;
            document.getElementById('bar_gryf').style.height = (data.gp * carpan) + 'px';
            document.getElementById('mvp_gryf').innerText = data.gm;

            document.getElementById('puan_sly').innerText = data.sp;
            document.getElementById('bar_sly').style.height = (data.sp * carpan) + 'px';
            document.getElementById('mvp_sly').innerText = data.sm;

            document.getElementById('puan_rav').innerText = data.rp;
            document.getElementById('bar_rav').style.height = (data.rp * carpan) + 'px';
            document.getElementById('mvp_rav').innerText = data.rm;

            document.getElementById('puan_huf').innerText = data.hp;
            document.getElementById('bar_huf').style.height = (data.hp * carpan) + 'px';
            document.getElementById('mvp_huf').innerText = data.hm;
        }
    </script>
</body>
</html>
