<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Wyxen Academy - House Points</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc33;
            --sly: #2ecc71; --rav: #3498db; --gry: #e74c3c; --huf: #f1c40f;
            --panel-bg: rgba(14, 16, 22, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: transparent; 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        .points-panel {
            width: 820px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 35px;
            padding: 40px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 30px;
            font-size: 30px;
            cursor: pointer;
            color: #555;
            transition: 0.2s;
        }
        .close-btn:hover { color: var(--gry); }

        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2.8rem; letter-spacing: 12px; }
        .header .decorator { height: 2px; width: 250px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 12px auto; }
        .header p { font-size: 0.8rem; letter-spacing: 5px; color: #555; text-transform: uppercase; }

        .chart-container {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 60px 20px 20px 20px;
            height: 350px; 
            display: flex;
            justify-content: space-around;
            align-items: flex-end; 
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
            width: 100px;
        }

        .point-bar {
            width: 55px;
            border-radius: 12px 12px 4px 4px;
            position: relative;
            min-height: 15px;
            transition: height 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .score-label {
            position: absolute;
            top: -35px;
            width: 100%;
            text-align: center;
            font-weight: 800;
            color: #fff;
            font-size: 1.2rem;
        }

        .house-logo-main {
            width: 45px; height: 45px;
            margin-top: 15px;
            object-fit: contain;
        }

        .sly { background: linear-gradient(to top, #1b4d31, var(--sly)); box-shadow: 0 0 25px rgba(46, 204, 113, 0.2); }
        .rav { background: linear-gradient(to top, #1a3a5a, var(--rav)); box-shadow: 0 0 25px rgba(52, 152, 219, 0.2); }
        .gry { background: linear-gradient(to top, #5a1a1a, var(--gry)); box-shadow: 0 0 25px rgba(231, 76, 60, 0.2); }
        .huf { background: linear-gradient(to top, #b8860b, var(--huf)); box-shadow: 0 0 25px rgba(241, 196, 15, 0.2); }

        .mvp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .mvp-box {
            background: rgba(255,255,255,0.02);
            padding: 15px 20px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .mini-logo { width: 40px; height: 40px; object-fit: contain; }
        .mvp-info b { font-size: 1.1rem; display: block; color: #eee; }
        .mvp-info span { color: #666; font-size: 0.85rem; font-weight: 600; }
        .mvp-info i { color: var(--gold); font-style: normal; font-weight: 700; }
    </style>
</head>
<body>

    <div class="points-panel">
        <div class="close-btn" onclick="gmod.closeMe()">×</div>
        <div class="header">
            <h1>WYXEN</h1>
            <div class="decorator"></div>
            <p>Hane Tablosu</p>
        </div>

        <div class="chart-container" id="house-chart">
            </div>

        <div class="mvp-grid" id="mvp-grid">
            </div>
    </div>

    <script>
        function updateTable(data) {
            const chart = document.getElementById('house-chart');
            const grid = document.getElementById('mvp-grid');
            
            chart.innerHTML = '';
            grid.innerHTML = '';

            const houses = [
                { id: 'sly', key: 'Slytherin', img: 'https://i.imgur.com/ORx7ROn.png' },
                { id: 'rav', key: 'Ravenclaw', img: 'https://i.imgur.com/Zu5zgMS.png' },
                { id: 'gry', key: 'Gryffindor', img: 'https://i.imgur.com/sNbRwux.png' },
                { id: 'huf', key: 'Hufflepuff', img: 'https://i.imgur.com/0c3csjs.png' }
            ];

            // En yüksek puanı bul (Yükseklik oranlaması için)
            let maxP = 1;
            houses.forEach(h => {
                let p = parseInt(data[h.key].score) || 0;
                if (p > maxP) maxP = p;
            });

            houses.forEach(h => {
                const hData = data[h.key];
                const score = hData.score || 0;
                const height = (score / maxP) * 90; // En yüksek hane %90 boyunda olur

                // Grafik barını ekle
                chart.innerHTML += `
                    <div class="bar-wrapper">
                        <div class="point-bar ${h.id}" style="height: 0%" id="bar-${h.id}">
                            <div class="score-label">${score}</div>
                        </div>
                        <img src="${h.img}" class="house-logo-main">
                    </div>
                `;

                // Animasyon için gecikmeli yükseklik ver
                setTimeout(() => {
                    document.getElementById(`bar-${h.id}`).style.height = height + "%";
                }, 100);

                // MVP kutusunu ekle
                grid.innerHTML += `
                    <div class="mvp-box" style="border-bottom: 3px solid var(--${h.id})">
                        <img src="${h.img}" class="mini-logo">
                        <div class="mvp-info">
                            <b>${hData.mvpName}</b>
                            <span>Katkı: <i>${hData.mvpPoint}</i> Puan</span>
                        </div>
                    </div>
                `;
            });
        }

        // GMod verisi hazır olduğunda tetiklenir
        window.onload = function() {
            if (typeof gmod !== "undefined" && gmod.onReady) {
                gmod.onReady();
            }
        };
    </script>
</body>
</html>
