<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Wyxen 1190x600</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc33;
            --sly: #2ecc71; --rav: #3498db; --gry: #e74c3c; --huf: #f1c40f;
            --panel-bg: rgba(10, 12, 18, 0.98);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: transparent; width: 1190px; height: 600px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .points-panel { 
            width: 1150px; height: 580px; background: var(--panel-bg); border-radius: 25px; 
            padding: 20px; border: 2px solid rgba(255, 204, 51, 0.3);
            display: flex; flex-direction: column; gap: 15px;
        }

        .header { text-align: center; }
        .header h1 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2.8rem; letter-spacing: 15px; }

        /* Grafikler Üstte */
        .chart-area { 
            flex: 1.2; background: rgba(255,255,255,0.02); border-radius: 20px; 
            display: flex; justify-content: space-around; align-items: flex-end; 
            padding: 20px 40px; border: 1px solid rgba(255,255,255,0.05);
        }
        .bar-wrap { display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; width: 150px; }
        .bar { width: 85px; border-radius: 8px 8px 3px 3px; position: relative; min-height: 20px; transition: height 1s ease-out; }
        .puan-val { position: absolute; top: -35px; width: 100%; text-align: center; font-weight: 800; font-size: 1.8rem; color: #fff; }
        .h-icon { width: 60px; height: 60px; margin-top: 10px; }

        .sly { background: linear-gradient(to top, #1b4d31, var(--sly)); }
        .rav { background: linear-gradient(to top, #1a3a5a, var(--rav)); }
        .gry { background: linear-gradient(to top, #5a1a1a, var(--gry)); }
        .huf { background: linear-gradient(to top, #b8860b, var(--huf)); }

        /* MVP'ler Altta */
        .mvp-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .mvp-item { 
            background: rgba(255,255,255,0.04); padding: 10px; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; text-align: center;
            border-bottom: 4px solid transparent;
        }
        .mvp-item img { width: 40px; height: 40px; margin-bottom: 5px; }
        .mvp-item b { font-size: 1rem; color: #fff; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mvp-item span { color: var(--gold); font-size: 0.8rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="points-panel">
        <div class="header"><h1>WYXEN ACADEMY</h1></div>
        
        <div class="chart-area">
            <div class="bar-wrap"><div id="bar_sly" class="bar sly"><div id="puan_sly" class="puan-val">0</div></div><img src="https://i.imgur.com/ORx7ROn.png" class="h-icon"></div>
            <div class="bar-wrap"><div id="bar_rav" class="bar rav"><div id="puan_rav" class="puan-val">0</div></div><img src="https://i.imgur.com/Zu5zgMS.png" class="h-icon"></div>
            <div class="bar-wrap"><div id="bar_gry" class="bar gry"><div id="puan_gry" class="puan-val">0</div></div><img src="https://i.imgur.com/sNbRwux.png" class="h-icon"></div>
            <div class="bar-wrap"><div id="bar_huf" class="bar huf"><div id="puan_huf" class="puan-val">0</div></div><img src="https://i.imgur.com/0c3csjs.png" class="h-icon"></div>
        </div>

        <div class="mvp-row">
            <div class="mvp-item" style="border-color: var(--sly)"><img src="https://i.imgur.com/ORx7ROn.png"><b id="name_sly">-</b><span>+<i id="mvppuan_sly">0</i> Puan</span></div>
            <div class="mvp-item" style="border-color: var(--rav)"><img src="https://i.imgur.com/Zu5zgMS.png"><b id="name_rav">-</b><span>+<i id="mvppuan_rav">0</i> Puan</span></div>
            <div class="mvp-item" style="border-color: var(--gry)"><img src="https://i.imgur.com/sNbRwux.png"><b id="name_gry">-</b><span>+<i id="mvppuan_gry">0</i> Puan</span></div>
            <div class="mvp-item" style="border-color: var(--huf)"><img src="https://i.imgur.com/0c3csjs.png"><b id="name_huf">-</b><span>+<i id="mvppuan_huf">0</i> Puan</span></div>
        </div>
    </div>

    <script>
        window.UpdateWyxen = function(data) {
            try {
                const stats = typeof data === 'string' ? JSON.parse(data) : data;
                const houses = ['sly', 'rav', 'gry', 'huf'];
                houses.forEach(h => {
                    const p = stats[h+'p'] || 0;
                    document.getElementById('puan_'+h).innerText = p;
                    document.getElementById('bar_'+h).style.height = Math.min(100, (p / 10)) + '%'; 
                    document.getElementById('name_'+h).innerText = stats[h+'m'] || "-";
                    document.getElementById('mvppuan_'+h).innerText = stats[h+'mp'] || 0;
                });
            } catch(e) {}
        };
    </script>
</body>
</html>
