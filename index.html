<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Wyxen Academy - Live House Points</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc33;
            --sly: #2ecc71; --rav: #3498db; --gry: #e74c3c; --huf: #f1c40f;
            --panel-bg: rgba(14, 16, 22, 0.98);
        }

        /* Temel Ayarlar - 1024x1024 tam ekran uyumu */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: transparent; 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 1024px; 
            height: 1024px; 
            overflow: hidden; 
        }

        .points-panel {
            width: 920px;
            background: var(--panel-bg);
            border: 2px solid rgba(255, 204, 51, 0.2);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 3.8rem; letter-spacing: 15px; text-shadow: 0 0 20px rgba(255, 204, 51, 0.3); }
        .header .decorator { height: 3px; width: 350px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 15px auto; }
        .header p { font-size: 1.1rem; letter-spacing: 6px; color: #aaa; text-transform: uppercase; }

        /* Grafik Alanı */
        .chart-container {
            background: rgba(0,0,0,0.5);
            border-radius: 25px;
            padding: 90px 30px 30px 30px;
            height: 420px; 
            display: flex;
            justify-content: space-around;
            align-items: flex-end; 
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .bar-wrapper { display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; width: 120px; }

        .point-bar {
            width: 70px;
            border-radius: 15px 15px 5px 5px;
            position: relative;
            min-height: 20px;
            height: 10%; /* Başlangıç boyu */
            transition: height 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); /* Akıcı yükselme efekti */
        }

        .score-label {
            position: absolute;
            top: -50px;
            width: 100%;
            text-align: center;
            font-weight: 800;
            color: #fff;
            font-size: 1.6rem;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .house-logo-main { width: 70px; height: 70px; margin-top: 20px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }

        /* Renkler */
        .sly { background: linear-gradient(to top, #1b4d31, var(--sly)); box-shadow: 0 0 30px rgba(46, 204, 113, 0.2); }
        .rav { background: linear-gradient(to top, #1a3a5a, var(--rav)); box-shadow: 0 0 30px rgba(52, 152, 219, 0.2); }
        .gry { background: linear-gradient(to top, #5a1a1a, var(--gry)); box-shadow: 0 0 30px rgba(231, 76, 60, 0.2); }
        .huf { background: linear-gradient(to top, #b8860b, var(--huf)); box-shadow: 0 0 30px rgba(241, 196, 15, 0.2); }

        /* MVP Alanı */
        .mvp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .mvp-box {
            background: rgba(255,255,255,0.03);
            padding: 18px 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 18px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .mini-logo { width: 50px; height: 50px; object-fit: contain; }
        .mvp-info b { font-size: 1.3rem; display: block; color: #efefef; letter-spacing: 0.5px; }
        .mvp-info span { color: #888; font-size: 0.95rem; font-weight: 600; }
        .mvp-info i { color: var(--gold); font-style: normal; font-weight: 800; }
    </style>
</head>
<body>

    <div class="points-panel">
        <div class="header">
            <h1>WYXEN ACADEMY</h1>
            <div class="decorator"></div>
            <p>Canlı Hane Puan Durumu</p>
        </div>

        <div class="chart-container">
            <div class="bar-wrapper">
                <div id="bar_sly" class="point-bar sly"><div id="puan_sly" class="score-label">0</div></div>
                <img src="https://i.imgur.com/ORx7ROn.png" class="house-logo-main">
            </div>
            <div class="bar-wrapper">
                <div id="bar_rav" class="point-bar rav"><div id="puan_rav" class="score-label">0</div></div>
                <img src="https://i.imgur.com/Zu5zgMS.png" class="house-logo-main">
            </div>
            <div class="bar-wrapper">
                <div id="bar_gry" class="point-bar gry"><div id="puan_gry" class="score-label">0</div></div>
                <img src="https://i.imgur.com/sNbRwux.png" class="house-logo-main">
            </div>
            <div class="bar-wrapper">
                <div id="bar_huf" class="point-bar huf"><div id="puan_huf" class="score-label">0</div></div>
                <img src="https://i.imgur.com/0c3csjs.png" class="house-logo-main">
            </div>
        </div>

        <div class="mvp-grid">
            <div class="mvp-box" style="border-left: 5px solid var(--sly)">
                <img src="https://i.imgur.com/ORx7ROn.png" class="mini-logo">
                <div class="mvp-info"><b id="name_sly">Yükleniyor...</b><span>Hane Birincisi</span></div>
            </div>
            <div class="mvp-box" style="border-left: 5px solid var(--rav)">
                <img src="https://i.imgur.com/Zu5zgMS.png" class="mini-logo">
                <div class="mvp-info"><b id="name_rav">Yükleniyor...</b><span>Hane Birincisi</span></div>
            </div>
            <div class="mvp-box" style="border-left: 5px solid var(--gry)">
                <img src="https://i.imgur.com/sNbRwux.png" class="mini-logo">
                <div class="mvp-info"><b id="name_gry">Yükleniyor...</b><span>Hane Birincisi</span></div>
            </div>
            <div class="mvp-box" style="border-left: 5px solid var(--huf)">
                <img src="https://i.imgur.com/0c3csjs.png" class="mini-logo">
                <div class="mvp-info"><b id="name_huf">Yükleniyor...</b><span>Hane Birincisi</span></div>
            </div>
        </div>
    </div>

    <script>
        // Lua'dan gelen ham veriyi işleyen ana fonksiyon
        function UpdateWyxen(data) {
            try {
                // Eğer veri JSON string olarak gelirse parse et
                const stats = typeof data === 'string' ? JSON.parse(data) : data;
                const houses = ['sly', 'rav', 'gry', 'huf'];
                
                houses.forEach(h => {
                    const puan = stats[h + 'p'] || 0;
                    const isim = stats[h + 'm'] || 'Yok';
                    
                    // Metinleri Güncelle
                    if(document.getElementById('puan_' + h)) document.getElementById('puan_' + h).innerText = puan;
                    if(document.getElementById('name_' + h)) document.getElementById('name_' + h).innerText = isim;
                    
                    // Bar Boyunu Güncelle (Max 1500 puana göre ayarlı, gerekirse /15 kısmını değiştir)
                    if(document.getElementById('bar_' + h)) {
                        const heightPercent = Math.min(100, Math.max(10, puan / 15)); 
                        document.getElementById('bar_' + h).style.height = heightPercent + '%';
                    }
                });
            } catch(e) {
                console.error("Wyxen Veri Hatası:", e);
            }
        }

        // Test amaçlı konsol çıktısı
        console.log("Wyxen Board Ready.");
    </script>
</body>
</html>
